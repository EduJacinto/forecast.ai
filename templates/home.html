<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Forecast</title>
    <link rel="stylesheet" href="../static/homedesign.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/about">About</a>
</div>

<div class="title">
	<h2>STOCK TICKER</h2>
</div>

<div class="container">
    <input id="tickerId" type="text" placeholder="Enter a Security Ticker e.g. MSFT">
    <button id="searchBtn" onclick="runPrediction()">Search</button>
</div>

<div id="status" class="status-msg"></div>

<div id="chartSection" style="display:none;">
    <h3 id="chartTitle" style="text-align:center; color:darkgreen;" />
    <div class="chart-wrapper">
        <canvas id="securityChart"></canvas>
    </div>
</div>

<footer>
    <p>&star; Security Forecast LSTM Prediction</p>
</footer>

<script>
    let chartInstance = null;

    async function runPrediction() {
        const ticker = document.getElementById("tickerId").value.trim().toUpperCase();
        const status = document.getElementById("status");
        const bt = getElementById("searchBtn");

        if (!ticker) {
            status.textContent = "Please enter a valid ticker symbol.";
            status.style.color = "red";
            return;
        }

        status.textContent = "⏳ Training model and building forecasting... this may take ~30 seconds.";
        status.style.color = "#555";
        btn.disabled = true;
        document.getElementById("chartSection").style.display = "none";

        try {
            const res = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ticker });
            });

            const data = await res.json();

            if (data.error) {
                status.textContent = "❌ " + data.error;
                status.style.color = "red";
                return;
            }

            renderChart(data);
            status.textContent = "";
        }
        catch (err) {
            status.textContent = "❌ Network error: " + err.message;
            status.style.color = "red";
        } 
        finally {
            btn.disabled = false;
        }
    }

    
</script>
</body>
</html>
