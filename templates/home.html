<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forecast.ai — AI Powered Price Prediction</title>
  <link rel="stylesheet" href="../static/index.css" />
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">forecast</a>
    <div class="nav-links">
      <a href="/" class="nav-link active">Predict</a>
      <a href="/about" class="nav-link">About</a>
    </div>
  </nav>

  <main class="main">
    <section class="hero">
      <p class="hero-eyebrow">LSTM Neural Network</p>
      <h1 class="hero-title">AI-Powered Stock<br>Price Forecasting</h1>
      <p class="hero-sub">Enter a ticker to train a model on 2 years of data and forecast closing prices for the next 30 trading days.</p>
    </section>

    <div class="search-bar">
      <input
        id="ticker-input"
        class="ticker-input"
        type="text"
        placeholder="Enter ticker symbol — AAPL, TSLA, VOO..."
        maxlength="10"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="predict-btn" class="predict-btn" onclick="runPrediction()">
        <span id="btn-label">Predict</span>
        <svg id="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
    </div>

    <div id="error-msg" class="error-msg hidden"></div>

    <div id="chart-section" class="chart-section hidden">
      <div class="chart-meta">
        <div>
          <span id="chart-ticker" class="chart-ticker-label"></span>
          <span id="chart-change" class="chart-change"></span>
        </div>
        <div class="chart-legend">
          <span class="legend-dot" id="legend-hist-dot"></span>
          <span class="legend-label">Historical</span>
          <span class="legend-dot legend-dot--purple"></span>
          <span class="legend-label">30-day forecast</span>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="priceChart" role="img" aria-label="Stock price chart showing historical data and 30-day forecast"></canvas>
      </div>
      <div class="stats-row" id="stats-row"></div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="../static/app.js"></script>
</body>
</html>
